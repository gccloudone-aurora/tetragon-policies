
# This tracing policy 'lsm' monitors the Linux Security Module hook
# bprm_check_security for selected interpreter executions.
#
# Description:
#  Captures the kernel's security validation step for process loading,
#  matching specified shell binaries and target program path suffixes.
#  It is useful for observing or enforcing suspicious shell execution patterns.
#
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: "lsm"
spec:
  lsmhooks:
  - hook: "bprm_check_security"
    args:
      - index: 0
        type: "linux_binprm"
    selectors:
    - matchBinaries:
      - operator: "In"
        values:
        - "/usr/bin/zsh"
        - "/usr/bin/bash"
      matchArgs:
        - index: 0
          operator: "Postfix"
          values:
            - "contrib/tester-progs/nop"
      matchActions:
        - action: Override
          argError: -1
        - action: Post
          imaHash: true
