# This tracing policy 'process-exec-elf-begin' captures the ELF or flat
# binary path when the kernel is about to switch execution to it.
#
# Description:
#  Uses the security_bprm_creds_from_file probe to record the target file path
#  of the new process image before execution begins.
#  This provides visibility into process execution and helps detect suspicious
#  or unexpected binaries.
#
# Limitation:
#  For shell scripts, it reports the final interpreter binary (for example
#  /bin/bash), not the original script path.
#
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: "process-exec-elf-begin"
  #annotations:
    #description: "Report the path of the elf or flat binary that is being executed"
    #author: "Djalal Harouni"
spec:
  kprobes:
  - call: "security_bprm_creds_from_file"
    syscall: false
    args:
    - index: 0
      type: "nop"
    - index: 1
      type: "file"
