---
# Tetragon Helm Chart Values for StatCan (Optimized for Low CPU/Memory Footprint)
# Chart: tetragon from https://cilium.github.io/tetragon

# Helm Chart Version (managed here for easy upgrades)
# Update this field to upgrade Tetragon to a new version
helmChartVersion: "1.6.1"

# Global configuration
imagePullSecrets:
  - name: cnp-image-pull-secret

# Tetragon Agent Configuration
tetragon:
  enabled: true
  image:
    repository: artifactory.cloud.statcan.ca/docker-quay-remote/cilium/tetragon
    tag: v1.6.1
    pullPolicy: IfNotPresent

  # Security: privileged mode required for eBPF
  securityContext:
    privileged: true

  podSecurityContext:
    runAsUser: 0
    runAsGroup: 0

  # Resources (optimized for low footprint)
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Probes
  livenessProbe:
    httpGet:
      path: /metrics
      port: 2112
    initialDelaySeconds: 30
    periodSeconds: 10

  readinessProbe:
    httpGet:
      path: /metrics
      port: 2112
    initialDelaySeconds: 5
    periodSeconds: 5

  # Network: hostNetwork required for full node monitoring
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet

  # Scheduling: avoid system nodes
  nodeSelector:
    node-role.kubernetes.io/system: "false"

  # HA: topology spread
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule

  # Service
  service:
    enabled: true
    type: ClusterIP
    port: 2112

  # Log export configuration (optimized for lower disk usage)
  config:
    exportFilePath: /var/run/cilium/tetragon/$(NODE_NAME)/tetragon.log
    exportFileMaxSizeMb: 50
    exportFileMaxBackups: 2
    exportFileCompress: true

# Tetragon Operator Configuration
operator:
  enabled: true
  image:
    repository: artifactory.cloud.statcan.ca/docker-quay-remote/cilium/tetragon-operator
    tag: v1.6.1
    pullPolicy: IfNotPresent

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

  # Resources (optimized for low footprint)
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

  service:
    enabled: true
    type: ClusterIP
    port: 2113

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: tetragon-operator
            topologyKey: kubernetes.io/hostname

  serviceAccount:
    create: true
    name: tetragon-operator-service-account

# Export Stdout Sidecar
export:
  stdout:
    enabled: true
    image:
      repository: artifactory.cloud.statcan.ca/docker-quay-remote/cilium/hubble-export-stdout
      tag: v1.1.0
      pullPolicy: IfNotPresent

# PVC for logs (managed separately, just reference it)
persistence:
  enabled: true
  existingClaim: tetragon-logs

# Prometheus monitoring
prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: prometheus-system
    labels:
      release: prometheus

# RBAC
rbac:
  create: true

# Service Accounts
serviceAccounts:
  tetragon:
    create: true
    name: tetragon
  operator:
    create: true
    name: tetragon-operator-service-account
    