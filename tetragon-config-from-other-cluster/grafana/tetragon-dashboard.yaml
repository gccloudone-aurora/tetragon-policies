---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tetragon-combined-dashboard
  namespace: prometheus-system
  labels:
    grafana_dashboard: "1"
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
data:
  combined-tetragon.json: |-
    {
      "title": "Tetragon Security Overview v19",
      "uid": "tetragon-security-v19",
      "tags": ["tetragon", "security", "production"],
      "timezone": "browser",
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "title": "TIER 1: Critical Privilege Modification Events (High Severity)",
          "type": "state-timeline",
          "gridPos": {"h": 11, "w": 24, "x": 0, "y": 0},
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum by (workload, binary) (increase(tetragon_events_total{type=\"PROCESS_EXEC\", workload!=\"\", binary=~\".*/(sudo|su|systemctl|chmod|chown)\"}[1m])) > 0",
              "legendFormat": "{{workload}} [{{binary}}]",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "options": {
            "mergeValues": true,
            "showValue": "never",
            "align": "left",
            "rowHeight": 0.8,
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 90, "lineWidth": 0 },
              "color": { "fixedColor": "dark-red", "mode": "fixed" }
            }
          }
        },
        {
          "id": 2,
          "title": "TIER 2: Workload Runtime Deviations & Package Ops (Medium Severity)",
          "type": "state-timeline",
          "gridPos": {"h": 11, "w": 24, "x": 0, "y": 11},
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "sum by (workload, binary) (increase(tetragon_events_total{type=\"PROCESS_EXEC\", workload!=\"\", binary=~\".*/(apt|apt-get|dpkg|apk|pip|conda|wget|curl|nc|nmap)\"}[1m])) > 0",
              "legendFormat": "{{workload}} [{{binary}}]",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "options": {
            "mergeValues": true,
            "showValue": "never",
            "align": "left",
            "rowHeight": 0.8,
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 80, "lineWidth": 0 },
              "color": { "fixedColor": "orange", "mode": "fixed" }
            }
          }
        }
      ],
      "templating": {"list": []},
      "time": {"from": "now-15m", "to": "now"},
      "schemaVersion": 37,
      "version": 19
    }
