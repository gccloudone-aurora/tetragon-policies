---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: tetragon
    repo: https://cilium.github.io/charts
    releaseName: tetragon
    namespace: kube-system
    version: 1.6.1
    valuesFile: values.yaml

# Custom resources NOT fully covered by Helm chart values
resources:
  # Storage: Custom PVC with specific Azure storage class
  - pvc.yaml
  
  # Custom TracingPolicies for security monitoring
  - policies/tetragon-basic-policies.yaml
  
  # Networking: Custom NetworkPolicy for Prometheus scraping
  - netpol.yaml
  # Service monitor for communication between kube-system and prometheus-system
  - servicemonitor.yaml
  
  # Simple critical alerts Grafana dashboard
  - grafana/tetragon-dashboard.yaml
  
  # High Availability: PodDisruptionBudget
  - poddisruptionbudget.yaml
  

# Override container images to use internal registry
# This is a fallback - images are also set in values.yaml
images:
  - name: quay.io/cilium/tetragon
    newName: artifactory.cloud.statcan.ca/docker-quay-remote/cilium/tetragon
    newTag: v1.6.1
  - name: quay.io/cilium/tetragon-operator
    newName: artifactory.cloud.statcan.ca/docker-quay-remote/cilium/tetragon-operator
    newTag: v1.6.1
  - name: quay.io/cilium/hubble-export-stdout
    newName: artifactory.cloud.statcan.ca/docker-quay-remote/cilium/hubble-export-stdout
    newTag: v1.1.0
