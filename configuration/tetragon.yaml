# Tetragon runtime configuration for cluster deployment.
#
# This configuration is inspired by a cluster deployment from The Zone at StatCan
# and the generic upstream runtime template. It is tuned for a Kubernetes security
# observability deployment and retains the security-relevant controls.
#
# Deploy as /etc/tetragon/tetragon.yaml or use corresponding Helm chart values.

bpf-lib: /var/lib/tetragon/
btf:
config-dir:
tracing-policy:
debug: false
disable-kprobe-multi: false
enable-export-aggregation: false
enable-k8s-api: true
enable-ancestors: true
enable-process-cred: true
enable-process-ns: true
event-queue-size: 10000
export-aggregation-buffer-size: 10000
export-aggregation-window-size: 15s
# Export filters (leave empty to allow all events)
export-allowlist:
export-denylist:
export-file-compress: true
export-file-max-backups: 2
export-file-max-size-mb: 50
export-file-rotation-interval: 0s
export-filename: /var/run/cilium/tetragon/$(NODE_NAME)/tetragon.log
export-rate-limit: -1
# Field filters for event reduction (empty = no filtering)
field-filters:
force-small-progs: false
# gops address for runtime inspection (empty = disabled)
gops-address:
# kernel BTF path (empty = auto-detect)
kernel:
log-format: text
log-level: info
# metrics-server address (empty = default)
metrics-server:
# metrics label filters (empty = no filtering)
metrics-label-filter:
netns-dir: /var/run/docker/netns/
# pprof address for profiling (empty = disabled)
pprof-address:
process-cache-size: 65536
procfs: /proc/
rb-size: 0
rb-size-total: 0
release-pinned-bpf: false
server-address: unix:///var/run/tetragon/tetragon.sock
verbose: 0
