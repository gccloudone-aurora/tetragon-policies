---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: tetragon
    repo: https://cilium.github.io/charts
    releaseName: tetragon
    namespace: kube-system
    version: 1.6.1
    valuesFile: values.yaml

# Configuration variables that are substituted into resources below
vars:
  - name: TETRAGON_NAMESPACE
    objref:
      kind: ConfigMap
      name: tetragon-config
      apiVersion: v1
    fieldref:
      fieldpath: data.tetragonNamespace
  - name: STORAGE_PVC_NAME
    objref:
      kind: ConfigMap
      name: tetragon-config
      apiVersion: v1
    fieldref:
      fieldpath: data.storagePvcName
  - name: STORAGE_SIZE
    objref:
      kind: ConfigMap
      name: tetragon-config
      apiVersion: v1
    fieldref:
      fieldpath: data.storageSize
  - name: STORAGE_CLASS_NAME
    objref:
      kind: ConfigMap
      name: tetragon-config
      apiVersion: v1
    fieldref:
      fieldpath: data.storageClassName
  - name: STORAGE_ACCESS_MODE
    objref:
      kind: ConfigMap
      name: tetragon-config
      apiVersion: v1
    fieldref:
      fieldpath: data.storageAccessMode
  - name: METRICS_PORT
    objref:
      kind: ConfigMap
      name: tetragon-config
      apiVersion: v1
    fieldref:
      fieldpath: data.metricsPort
  - name: PROMETHEUS_NAMESPACE
    objref:
      kind: ConfigMap
      name: tetragon-config
      apiVersion: v1
    fieldref:
      fieldpath: data.prometheusNamespace
  - name: PROMETHEUS_RELEASE_LABEL
    objref:
      kind: ConfigMap
      name: tetragon-config
      apiVersion: v1
    fieldref:
      fieldpath: data.prometheusReleaseLabel
  - name: SCRAPE_INTERVAL
    objref:
      kind: ConfigMap
      name: tetragon-config
      apiVersion: v1
    fieldref:
      fieldpath: data.scrapeInterval
  - name: PDB_MIN_AVAILABLE
    objref:
      kind: ConfigMap
      name: tetragon-config
      apiVersion: v1
    fieldref:
      fieldpath: data.pdbMinAvailable

configMapGenerator:
  - name: tetragon-config
    literals:
      - tetragonNamespace=kube-system
      - storagePvcName=tetragon-logs
      - storageSize=10Gi
      - storageClassName=azurefile-premium
      - storageAccessMode=ReadWriteMany
      - metricsPort=2112
      - prometheusNamespace=prometheus-system
      - prometheusReleaseLabel=prometheus
      - scrapeInterval=30s
      - pdbMinAvailable=1

resources:
  - pvc.yaml
  - ../si-3
  - netpol.yaml
  - servicemonitor.yaml
  - poddisruptionbudget.yaml

images:
  - name: quay.io/cilium/tetragon
    newName: artifactory.cloud.statcan.ca/docker-quay-remote/cilium/tetragon
    newTag: v1.6.1
  - name: quay.io/cilium/tetragon-operator
    newName: artifactory.cloud.statcan.ca/docker-quay-remote/cilium/tetragon-operator
    newTag: v1.6.1
  - name: quay.io/cilium/hubble-export-stdout
    newName: artifactory.cloud.statcan.ca/docker-quay-remote/cilium/hubble-export-stdout
    newTag: v1.1.0
